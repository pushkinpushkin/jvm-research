services:
  sandbox-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-bellsoft/liberica-openjre-alpine:21.0.11-11}
    image: jvm-research-sandbox:${JVM_VARIANT:-hotspot-liberica}
    cpus: "${CONTAINER_CPU_LIMIT:-1}"
    mem_limit: ${CONTAINER_MEMORY_LIMIT:-1g}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      TZ: ${TZ:-Europe/Moscow}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production,kubernetes}
      MONGO_URI: mongodb://mongo:27017/jvm_research
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXTERNAL_API_BASE_URL: http://wiremock:8080
      SANDBOX_PROFILE_ENABLED: "true"
      SANDBOX_EXTERNAL_LONG_DELAY_PERCENT: "3"
      SANDBOX_EXTERNAL_ERROR_PERCENT: "5"
      SANDBOX_EXTERNAL_INVALID_PERCENT: "2"
      SANDBOX_EXTERNAL_SLOW_PERCENT: "15"
      SANDBOX_MONGO_CONFLICT_PERCENT: "2"
      SANDBOX_KAFKA_DUPLICATE_PERCENT: "5"
      RUN_ID: ${RUN_ID:-local}
      RUN_PROFILE: ${RUN_PROFILE:-local}
      JVM_VARIANT: ${JVM_VARIANT:-hotspot-liberica}
      JVM_PROFILE: ${JVM_PROFILE:-local}
      GIT_SHA: ${GIT_SHA:-unknown}
      CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-1}
      CONTAINER_MEMORY_LIMIT: ${CONTAINER_MEMORY_LIMIT:-1g}
      WORK_CPU_REQUEST: ${WORK_CPU_REQUEST:-10m}
      WORK_CPU_LIMIT: ${WORK_CPU_LIMIT:-1}
      WORK_MEMORY_REQUEST: ${WORK_MEMORY_REQUEST:-512Mi}
      WORK_MEMORY_LIMIT: ${WORK_MEMORY_LIMIT:-1Gi}
      WORK_TIMEZONE: ${WORK_TIMEZONE:-Europe/Moscow}
      WORK_EXTRA_JAVA_OPTS: ${WORK_EXTRA_JAVA_OPTS:--Dserver.max-http-request-header-size=30000}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    volumes:
      - ${RUN_RESULTS_DIR:-../results/local}/app-logs:/app/logs
    depends_on:
      - mongo
      - kafka
      - wiremock

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "6"

  wiremock:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8089:8080"
    command:
      - --global-response-templating
      - --verbose
    volumes:
      - ./wiremock:/home/wiremock

volumes:
  mongo-data:
